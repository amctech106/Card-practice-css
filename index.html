<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <title>Text Practice</title>
        <style>
            .card {
                width: 400px;
                height: 230px;
                box-shadow: 1px 1px 20px 1px black;
                font-family: Arial, Helvetica, sans-serif;
                border-radius: 20px;
                overflow: hidden;
                margin: 100px auto;
                transition: 0.5s;

            }

            .card:hover {
                transform: scale(1.05);
            }

            h1 {
                text-align: center;
                background-color: purple;
                color: white;
                margin: 0%;
                padding: 5px;
            }

            .flex {
                display: flex;
                align-items: center;
                justify-content: space-around;
                margin-left: 15px;
            }

            .text {
                padding: 15px;
                margin-top: 0px;
            }


            .pic {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                border: 3px solid orange;
            }

            #valid {
                text-align: center;
                letter-spacing: 2px;
                background-color: rgba(128, 0, 128, 0.5);
                margin-top: 18px;
                color: white;

            }

            span {
                font-weight: bolder;
                margin-right: 25px;
            }
        </style>
    </head>

<body>
    <div class="card">
        <h1>STUDENT ID CARD</h1>
        <div class="flex">
            <div class="img"><img src="./amc.jpg" alt="image" class="pic"></div>
            <div class="text">
                <p><span id="spn">Name:</span> Abdul Majeed</p>
                <p><span id="spn">Class:</span> Computer</p>
                <p><span id="spn">Roll No:</span> **********</p>

            </div>

        </div>
        <p id="valid">This card is valid up to 2028</p>
    </div>
</body>

</html>
